version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dcs_ops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dcs_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do not expose port externally — only accessible within the compose network
    expose:
      - "5432"

  # ── DCS Ops Center API + Web (combined) ─────────────────────────────────────
  app:
    image: ghcr.io/kareemschultz/ndma-dcs-ops-center/app:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dcs_ops}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── DCS Ops Center Docs (Fumadocs static — nginx) ───────────────────────────
  docs:
    image: ghcr.io/kareemschultz/ndma-dcs-ops-center/docs:latest
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/docs',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Watchtower — auto-pull new GHCR images every 5 minutes ──────────────────
  # Watches only the app and docs containers. Migrations run automatically on
  # app startup (runMigrations() in apps/server/src/index.ts).
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount host docker credentials so Watchtower can pull from GHCR
      - /home/eadmin/.docker:/root/.docker:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_NO_STARTUP_MESSAGE: "false"
    # Limit to only these two services — do not touch postgres or watchtower itself
    command: ndma-dcs-app-1 ndma-dcs-docs-1

volumes:
  postgres_data:
    driver: local
